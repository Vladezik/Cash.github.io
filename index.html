<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Касса — Подсчет</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="app">
        <header class="app-header">
            <button id="themeToggle" class="icon-btn" aria-label="Тема">
                <i class="fas fa-sun"></i>
            </button>
            <h1 class="app-title">Касса</h1>
            <button id="historyToggle" class="icon-btn" aria-label="История">
                <i class="fas fa-history"></i>
            </button>
        </header>

        <section class="target-section">
            <label class="section-label">Целевая сумма</label>
            <div class="target-input-wrap">
                <input type="text" id="targetAmount" placeholder="0.00" inputmode="decimal" autocomplete="off">
                <span class="currency">₴</span>
            </div>
            
            <div class="progress-box" id="progressBox">
                <div class="progress-info">
                    <span>Набрано: <strong id="progressCurrent">0.00</strong> ₴</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <section class="denoms-section">
            <label class="section-label">Номиналы</label>
            <div class="denoms-grid" id="denomsGrid"></div>
        </section>

        <button id="calculateBtn" class="btn-primary">
            <i class="fas fa-calculator"></i>
            <span>Рассчитать</span>
        </button>

        <div id="resultCard" class="result-card hidden">
            <div class="receipt">
                <div class="receipt-header">
                    <i class="fas fa-receipt"></i>
                    <span>КАССОВЫЙ ЧЕК</span>
                </div>
                <div class="receipt-divider"></div>
                <div id="receiptBody" class="receipt-body"></div>
                <div class="receipt-divider dashed"></div>
                <div class="receipt-total-row">
                    <span>ИТОГО</span>
                    <span id="receiptTotal">0.00 ₴</span>
                </div>
                <div class="receipt-diff-row" id="receiptDiffRow">
                    <span>РАЗНИЦА</span>
                    <span id="receiptDiff">0.00 ₴</span>
                </div>
                <div class="receipt-time" id="receiptTime"></div>
            </div>
            
            <div class="result-actions">
                <button id="saveToHistoryBtn" class="btn-secondary" style="flex: none; width: 100%;">
                    <i class="fas fa-save"></i> В историю
                </button>
            </div>
        </div>

        <button id="resetBtn" class="btn-text-danger">
            <i class="fas fa-trash-alt"></i> Очистить все
        </button>
    </div>

    <div id="historySheet" class="sheet hidden">
        <div class="sheet-overlay"></div>
        <div class="sheet-content">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <h3>История подсчетов</h3>
                <div style="display: flex; gap: 8px;">
                    <button id="exportHistoryBtn" class="btn-text-small" title="Экспортировать">
                        <i class="fas fa-download"></i>
                    </button>
                    <button id="clearHistoryBtn" class="btn-text-small">Очистить</button>
                </div>
            </div>
            <div id="historyList" class="history-list">
                <div class="history-empty">История пуста</div>
            </div>
        </div>
    </div>

    <div id="confirmDialog" class="dialog-overlay hidden">
        <div class="dialog">
            <div class="dialog-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <h3>Очистить все?</h3>
            <p>Все введенные данные и текущий расчет будут удалены.</p>
            <div class="dialog-buttons">
                <button id="confirmNo" class="btn-dialog">Отмена</button>
                <button id="confirmYes" class="btn-dialog btn-dialog-primary">Очистить</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <div id="confettiContainer" class="confetti-container"></div>

    <script src="script.js"></script>
</body>
</html>
